<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses & Pacing | SimpleSIS</title>
  <link rel="stylesheet" href="teacher-portal.css">
  <style>
    .checkbox-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; background: #f8fafc; padding: 12px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 6px;}
    .checkbox-grid label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: #475569;}
    select[multiple] { height: 100px; padding: 8px; font-size: 14px; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    .badge-req { background: #fee2e2; color: #b91c1c; }
    .badge-ele { background: #e0e7ff; color: #4338ca; }
    .badge-aft { background: #fef3c7; color: #b45309; }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <aside class="sidebar">
     <div class="brand">
        <img id="sidebar-logo" src="https://i.ibb.co/0yr3x8Yn/Newton.png" alt="School Logo" class="" style="max-width: 150px; max-height: 150px; width: 100%; object-fit: contain; border-radius: 8px;">
          <h2 id="sidebar-brand-name" style="color: rgb(0, 36, 143);">SimpleSIS</h2>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="users.html">Users & Roles</a>
        <a href="courses.html" class="active">Courses & Pacing</a>
        <a href="enrollment.html">Enrollment</a>
        <a href="attendance.html">Live Attendance</a>
        <a href="reports.html">Reports</a>
        <a href="settings.html">Settings</a>
        <a href="profile.html">My Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div>
          <h1>Master Schedule</h1>
          <p id="display-school-name" class="subtitle">Manage courses and sections.</p>
        </div>
        <div class="header-actions">
          <button id="open-course-modal-btn" class="btn-primary">+ Create Course</button>
        </div>
      </header>

      <section class="table-container">
        <table id="courses-table">
          <thead>
            <tr>
              <th>Course Name & Code</th>
              <th>Type & Room</th>
              <th>Schedule</th>
              <th>Status</th>
              <th style="text-align: right;">Actions</th>
            </tr>
          </thead>
          <tbody id="courses-tbody">
            <tr><td colspan="5" style="text-align: center;">Loading courses...</td></tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="course-modal" class="modal hidden">
    <div class="modal-content" style="width: 600px; max-height: 90vh; overflow-y: auto;">
      <div class="modal-header">
        <h2 id="modal-title">Create New Course</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      
      <form id="course-form">
        <input type="hidden" id="edit-course-id">
        
        <div style="display: flex; gap: 16px; margin-bottom: 16px;">
          <div style="flex: 1;">
            <label for="course-code" style="font-size: 14px; font-weight: 500; color: #475569;">Course Code</label>
            <input type="text" id="course-code" placeholder="e.g., CS101" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
          <div style="flex: 2;">
            <label for="course-name" style="font-size: 14px; font-weight: 500; color: #475569;">Course Name</label>
            <input type="text" id="course-name" placeholder="e.g., Intro to Comp Sci" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 16px;">
          <div style="flex: 1;">
            <label for="course-type" style="font-size: 14px; font-weight: 500; color: #475569;">Course Type</label>
            <select id="course-type" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
              <option value="Required">Required</option>
              <option value="Elective">Elective</option>
              <option value="After-School">After-School</option>
            </select>
          </div>
          <div style="flex: 1;">
            <label for="course-room" style="font-size: 14px; font-weight: 500; color: #475569;">Room Number</label>
            <input type="text" id="course-room" placeholder="e.g., 204 or Gym" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px;">
          <div style="flex: 1;">
            <label for="start-date" style="font-size: 14px; font-weight: 500; color: #475569;">Start Date</label>
            <input type="date" id="start-date" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
          <div style="flex: 1;">
            <label for="end-date" style="font-size: 14px; font-weight: 500; color: #475569;">End Date</label>
            <input type="date" id="end-date" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 16px;">
          <div style="flex: 1;">
            <label for="start-time" style="font-size: 14px; font-weight: 500; color: #475569;">Start Time</label>
            <input type="time" id="start-time" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
          <div style="flex: 1;">
            <label for="end-time" style="font-size: 14px; font-weight: 500; color: #475569;">End Time</label>
            <input type="time" id="end-time" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
        </div>

        <div style="margin-bottom: 20px;">
          <label style="font-size: 14px; font-weight: 500; color: #475569;">Days Met</label>
          <div class="checkbox-grid">
            <label><input type="checkbox" class="day-chk" value="M"> Monday</label>
            <label><input type="checkbox" class="day-chk" value="T"> Tuesday</label>
            <label><input type="checkbox" class="day-chk" value="W"> Wednesday</label>
            <label><input type="checkbox" class="day-chk" value="Th"> Thursday</label>
            <label><input type="checkbox" class="day-chk" value="F"> Friday</label>
          </div>
        </div>

        <div style="margin-bottom: 24px; border-top: 1px solid #e2e8f0; padding-top: 16px;">
          <label for="course-teacher" style="font-size: 14px; font-weight: 500; color: #475569; display: block; margin-bottom: 6px;">Assigned Teacher(s) <span style="font-size: 12px; font-weight: normal;">(Hold Ctrl/Cmd to select multiple)</span></label>
          <select id="course-teacher" multiple style="width: 100%; border: 1px solid #cbd5e1; border-radius: 6px;" required>
            </select>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center;">
          <label style="font-size: 14px; color: #475569; display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="course-active" checked> Course is Active
          </label>
          <div style="display: flex; gap: 12px;">
            <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
            <button type="submit" id="save-course-btn" class="btn-primary">Save Course</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="courses.js"></script>
</body>
</html>
