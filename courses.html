<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses & Pacing | SimpleSIS</title>
  <link rel="stylesheet" href="courses.css">
</head>
<body>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="brand">
        <h2>SimpleSIS</h2>
      </div>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="users.html">Users & Roles</a>
        <a href="courses.html" class="active">Courses & Pacing</a>
        <a href="#">Live Attendance</a>
        <a href="#">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header">
        <div>
          <h1>Course Management</h1>
          <p id="display-school-name" class="subtitle">Loading...</p>
        </div>
        <div class="header-actions">
          <button id="open-create-modal-btn" class="btn-primary">+ Create New Course</button>
        </div>
      </header>

      <section class="table-container">
        <table id="courses-table">
          <thead>
            <tr>
              <th>Course Code</th>
              <th>Course Name</th>
              <th>Instructor</th>
              <th>Term</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="courses-tbody">
            </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="course-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create Course Section</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <form id="course-form">
        <div class="input-row">
          <div class="input-group">
            <label for="course-code">Course Code</label>
            <input type="text" id="course-code" placeholder="e.g., CS-101" required>
          </div>
          <div class="input-group">
            <label for="course-term">Term</label>
            <select id="course-term" required>
              <option value="Spring 2026">Spring 2026</option>
              <option value="Fall 2026">Fall 2026</option>
            </select>
          </div>
        </div>
        
        <div class="input-group">
          <label for="course-name">Course Name</label>
          <input type="text" id="course-name" placeholder="e.g., Intro to Esports Management" required>
        </div>
        
        <div class="input-group">
          <label for="course-teacher">Assign Instructor</label>
          <select id="course-teacher" required>
            <option value="" disabled selected>Loading teachers...</option>
            </select>
        </div>

        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
          <button type="submit" id="submit-course-btn" class="btn-primary">Save Course</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="courses.js"></script>
</body>
</html>
