<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradebook Matrix | SimpleSIS</title>
  <link rel="stylesheet" href="teacher-portal.css">
  <style>
    /* Matrix Grid Styling */
    .table-container { overflow-x: auto; max-width: 100%; border-radius: 12px; border: 1px solid #eaebed; background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; text-align: left; min-width: 800px; }
    thead { background-color: #f8fafc; }
    th, td { padding: 12px 16px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; white-space: nowrap; }
    th { font-size: 13px; text-transform: uppercase; color: #64748b; letter-spacing: 0.5px; vertical-align: bottom; }
    
    /* Sticky First Column for Student Names */
    th:first-child, td:first-child { position: sticky; left: 0; z-index: 2; border-right: 2px solid #cbd5e1; }
    th:first-child { background-color: #f8fafc; }
    td:first-child { background-color: #ffffff; z-index: 1; font-weight: 500; }

    /* Input Cells */
    .grid-input { width: 60px; padding: 8px; text-align: center; border: 1px solid transparent; border-radius: 4px; font-size: 14px; background: #f8fafc; font-weight: 500; color: #0f172a; transition: all 0.2s;}
    .grid-input:hover { border-color: #cbd5e1; }
    .grid-input:focus { border-color: var(--primary-color); outline: none; background: #e8f0fe; box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2); }
    
    /* Legend */
    .grade-legend { display: flex; gap: 16px; font-size: 13px; color: #64748b; margin-top: 12px; }
    .grade-legend span { display: flex; align-items: center; gap: 6px; }
    .grade-legend kbd { background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; color: #0f172a;}

    /* Modal Specifics */
    textarea { font-family: inherit; resize: vertical; }
    .assignment-list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #e2e8f0; }
  </style>
</head>
<body>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="brand">
        <h2 id="sidebar-brand-name">SimpleSIS</h2>
      </div>
      <nav>
        <a href="teacher-portal.html">My Dashboard</a>
        <a href="teacher-portal.html">Take Attendance</a>
        <a href="#" class="active">Gradebook</a>
        <a href="#">My Profile</a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="btn-secondary">Log Out</button>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-header" style="margin-bottom: 20px;">
        <div>
          <h1 id="course-title-display">Loading Course...</h1>
          <p class="subtitle">Master Gradebook Matrix</p>
          <div class="grade-legend">
            <span>Type <kbd>M</kbd> for Missing</span>
            <span>Type <kbd>NC</kbd> for No Count</span>
          </div>
        </div>
        <div class="header-actions" style="display: flex; gap: 12px;">
          <button id="open-assignment-modal-btn" class="btn-secondary">⚙️ Manage Assignments</button>
          <button id="submit-grades-btn" class="btn-primary" disabled>💾 Save All Grades</button>
        </div>
      </header>

      <section class="table-container">
        <table id="matrix-table">
          <thead id="matrix-thead">
            <tr>
              <th>Student Name</th>
              </tr>
          </thead>
          <tbody id="matrix-tbody">
            <tr>
              <td style="text-align: center; color: #64748b; padding: 24px;">Loading gradebook matrix...</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>

  <div id="assignment-modal" class="modal hidden">
    <div class="modal-content" style="width: 650px; max-height: 90vh; overflow-y: auto;">
      <div class="modal-header">
        <h2>Assignment Manager</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>

      <form id="assignment-form" style="background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 30px;">
        <h3 id="form-mode-title" style="margin-bottom: 16px; font-size: 16px; color: var(--primary-color);">+ Create New Assignment</h3>
        <input type="hidden" id="edit-id">

        <div class="input-group">
          <label for="assign-title">Assignment Title</label>
          <input type="text" id="assign-title" required>
        </div>

        <div style="display: flex; gap: 16px; margin-bottom: 20px;">
          <div style="flex: 1;">
            <label for="assign-date" style="display: block; margin-bottom: 6px; font-size: 14px; color: #475569;">Date Assigned</label>
            <input type="date" id="assign-date" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
          <div style="flex: 1;">
            <label for="assign-due" style="display: block; margin-bottom: 6px; font-size: 14px; color: #475569;">Date Due</label>
            <input type="date" id="assign-due" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
          <div style="flex: 1;">
            <label for="assign-max" style="display: block; margin-bottom: 6px; font-size: 14px; color: #475569;">Max Score</label>
            <input type="number" id="assign-max" min="1" value="100" style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px;" required>
          </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 12px;">
          <button type="button" id="cancel-edit-btn" class="btn-secondary hidden" style="width: auto;">Cancel Edit</button>
          <button type="submit" id="save-assignment-btn" class="btn-primary" style="width: auto;">Save Assignment</button>
        </div>
      </form>

      <h3>Course Assignments</h3>
      <div id="assignments-list" style="margin-top: 12px;"></div>
    </div>
  </div>

  <script type="module" src="gradebook.js"></script>
</body>
</html>
