<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | SimpleSIS</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h2>Welcome Back</h2>
        <p>Enter your credentials to access your portal.</p>
      </div>

      <form id="standard-login-form">
        <div class="input-group">
          <label for="login-school-id">School ID</label>
          <input type="text" id="login-school-id" placeholder="e.g., SCH-9001" required>
        </div>
        <div class="input-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" placeholder="name@school.edu" required>
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required>
        </div>
        
        <button type="submit" class="btn-primary">Sign In</button>
        <p id="login-error" class="error-text hidden">Invalid credentials or School ID.</p>
      </form>

      <div class="login-footer">
        <a href="index.html">&larr; Back to SimpleSIS Home</a>
      </div>
    </div>
  </div>

  <script type="module" src="login.js"></script>
</body>
</html>
