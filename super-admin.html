<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Control | SimpleSIS</title>
  <link rel="stylesheet" href="super-admin.css">
</head>
<body>

  <div id="super-login-container" class="login-wrapper">
  <div class="login-card">
    <h2>SimpleSIS Master Access</h2>
    <p>Restricted area. Super Admins only.</p>
    <form id="super-login-form">
      <div class="input-group">
        <label for="super-email">Admin Email</label>
        <input type="email" id="super-email" required>
      </div>
      <div class="input-group">
        <label for="super-password">Password</label>
        <input type="password" id="super-password" required>
      </div>
      <button type="submit" class="btn-primary">Authenticate</button>
      <p id="login-error" class="error-text hidden">Access Denied.</p>
    </form>
  </div>
</div>

<div id="app-content" class="hidden">
  <div class="master-layout">
    <header class="master-header">
      <div>
        <h1>SimpleSIS Master Control</h1>
        <p>Global Tenant Management</p>
      </div>
      <div class="header-actions">
        <span id="super-admin-email-display" style="margin-right: 16px; color: #94a3b8;"></span>
        <button id="super-logout-btn" class="btn-secondary" style="margin-right: 16px; background: white;">Logout</button>
        <button id="open-create-modal-btn" class="btn-primary">+ Provision New School</button>
      </div>
    </header>

    <main class="table-container">
      <table id="schools-table">
        <thead>
          <tr>
            <th>School ID</th>
            <th>Institution Name</th>
            <th>Admin Contact</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="schools-tbody">
          </tbody>
      </table>
    </main>
  </div>

  <div id="school-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modal-title">Provision New School</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <form id="school-form">
        <div class="input-group">
          <label for="new-school-id">Custom School ID</label>
          <input type="text" id="new-school-id" placeholder="e.g., SCH-9001" required>
        </div>
        <div class="input-group">
          <label for="new-school-status">Initial Status</label>
          <select id="new-school-status">
            <option value="pending">Pending Setup (Hand off to Admin)</option>
            <option value="active">Active</option>
            <option value="suspended">Suspended</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn-secondary">Cancel</button>
          <button type="submit" class="btn-primary">Save to Database</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="super-admin.js"></script>
</body>
</html>
